<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#B0B0B0"/>
      <stop offset="100%" style="stop-color:#D0D0D0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003399"/>
      <stop offset="100%" style="stop-color:#001A66"/>
    </linearGradient>
    <linearGradient id="silverText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F0F0"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Chrome Ring -->
  <circle cx="100" cy="100" r="95" fill="url(#chromeGrad)" filter="url(#shadow)"/>
  
  <!-- Inner Blue Circle -->
  <circle cx="100" cy="100" r="85" fill="url(#blueGrad)"/>
  
  <!-- Red accent arc (car roofline) -->
  <path d="M 40 55 Q 100 25 160 55" stroke="#CC0000" stroke-width="3" fill="none"/>
  
  <!-- RAVI Text -->
  <text x="100" y="72" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#silverText)">RAVI</text>
  
  <!-- Wood-tone banner bar -->
  <rect x="15" y="82" width="170" height="30" rx="3" fill="#D4B896" stroke="#B89A6F" stroke-width="1"/>
  <rect x="15" y="82" width="170" height="1" fill="#C4A880" opacity="0.5"/>
  <rect x="15" y="86" width="170" height="1" fill="#BFA075" opacity="0.3"/>
  <rect x="15" y="95" width="170" height="1" fill="#BFA075" opacity="0.3"/>
  <rect x="15" y="104" width="170" height="1" fill="#BFA075" opacity="0.3"/>
  
  <!-- GENUINE AUTOS Text on banner -->
  <text x="100" y="103" text-anchor="middle" font-family="Times New Roman, Georgia, serif" font-size="16" font-weight="bold" fill="#8B0000">GENUINE AUTOS</text>
  
  <!-- AUTOS Text -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#silverText)">AUTOS</text>
  
  <!-- SALE & SERVICE & PARTS subtext -->
  <text x="100" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="normal" fill="#A0A0B0" letter-spacing="2">SALE &amp; SERVICE &amp; PARTS</text>
</svg>
